<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krishi Sahayak Admin | Farmer Database</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold text-slate-800">Farmer Database (एडमिन पैनल)</h1>
                <p class="text-slate-500">List of all registered farmers and their profiles</p>
            </div>
            <a href="/" class="bg-slate-800 text-white px-4 py-2 rounded-lg text-sm font-semibold">Back to App</a>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-50 border-b border-slate-200">
                    <tr>
                        <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase">Name</th>
                        <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase">Mobile</th>
                        <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase">Location</th>
                        <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase">District/Village</th>
                    </tr>
                </thead>
                <tbody id="farmerList">
                    <!-- Data will be loaded here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadFarmers() {
            const res = await fetch('/api/admin/farmers');
            const farmers = await res.json();
            const list = document.getElementById('farmerList');

            if (farmers.length === 0) {
                list.innerHTML = '<tr><td colspan="4" class="px-6 py-12 text-center text-slate-400">No farmers registered yet.</td></tr>';
                return;
            }

            list.innerHTML = farmers.map(f => `
                <tr class="border-b border-slate-100 hover:bg-slate-50 transition-colors">
                    <td class="px-6 py-4">
                        <p class="font-bold text-slate-800">${f.name || 'N/A'}</p>
                    </td>
                    <td class="px-6 py-4 text-sm text-slate-600">${f.mobile || 'N/A'}</td>
                    <td class="px-6 py-4 text-sm text-slate-600">${f.state || 'N/A'}</td>
                    <td class="px-6 py-4">
                        <p class="text-xs font-semibold text-slate-500">${f.district || 'N/A'}</p>
                        <p class="text-[10px] text-slate-400">${f.village || ''}</p>
                    </td>
                </tr>
            `).join('');
        }

        loadFarmers();
    </script>
</body>
</html>
