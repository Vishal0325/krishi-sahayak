<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krishi Sahayak Admin | Control Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f8fafc; }
        .tab-btn.active { border-bottom-color: #1e293b; color: #1e293b; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold text-slate-800">Krishi Sahayak Admin</h1>
                <p class="text-slate-500">Manage farmers and crop scans</p>
            </div>
            <a href="/" class="bg-slate-800 text-white px-4 py-2 rounded-lg text-sm font-semibold">Back to App</a>
        </div>

        <!-- TABS -->
        <div class="flex gap-8 border-b border-slate-200 mb-8">
            <button onclick="showTab('farmers')" id="tab-farmers" class="tab-btn active pb-4 text-sm font-bold text-slate-400 border-b-2 border-transparent transition-all">Farmers List</button>
            <button onclick="showTab('scans')" id="tab-scans" class="tab-btn pb-4 text-sm font-bold text-slate-400 border-b-2 border-transparent transition-all">Crop Scans</button>
        </div>

        <!-- FARMERS TAB -->
        <div id="view-farmers" class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-50 border-b border-slate-200">
                    <tr>
                        <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase">Name</th>
                        <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase">Mobile</th>
                        <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase">Location</th>
                        <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase">Crops</th>
                    </tr>
                </thead>
                <tbody id="farmerList"></tbody>
            </table>
        </div>

        <!-- SCANS TAB -->
        <div id="view-scans" class="hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Scan Cards will load here -->
        </div>
    </div>

    <script>
        function showTab(t) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-'+t).classList.add('active');

            document.getElementById('view-farmers').classList.add('hidden');
            document.getElementById('view-scans').classList.add('hidden');

            if (t === 'farmers') {
                document.getElementById('view-farmers').classList.remove('hidden');
                loadFarmers();
            } else {
                document.getElementById('view-scans').classList.remove('hidden');
                loadScans();
            }
        }

        async function loadFarmers() {
            const res = await fetch('/api/admin/farmers');
            const farmers = await res.json();
            const list = document.getElementById('farmerList');
            list.innerHTML = farmers.map(f => `
                <tr class="border-b border-slate-100 hover:bg-slate-50">
                    <td class="px-6 py-4 font-bold text-slate-800">${f.name || 'N/A'}</td>
                    <td class="px-6 py-4 text-sm text-slate-600">${f.mobile || 'N/A'}</td>
                    <td class="px-6 py-4 text-sm text-slate-600">${f.district || ''}, ${f.state || ''}</td>
                    <td class="px-6 py-4 text-xs text-slate-500">${f.crops || 'None'}</td>
                </tr>
            `).join('');
        }

        async function loadScans() {
            const res = await fetch('/api/admin/scans');
            const scans = await res.json();
            const grid = document.getElementById('view-scans');

            if (scans.length === 0) {
                grid.innerHTML = '<p class="col-span-3 text-center py-12 text-slate-400 font-bold">No photos uploaded yet.</p>';
                return;
            }

            grid.innerHTML = scans.map(s => `
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden group">
                    <div class="h-48 overflow-hidden bg-slate-100">
                        <img src="${s.url}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                    </div>
                    <div class="p-4 space-y-2">
                        <div class="flex justify-between items-start">
                            <p class="font-bold text-slate-800">${s.farmer}</p>
                            <span class="text-[10px] font-bold bg-emerald-50 text-emerald-600 px-2 py-1 rounded">${s.conf}</span>
                        </div>
                        <p class="text-xs font-bold text-red-500 uppercase">${s.issue}</p>
                        <p class="text-[9px] text-slate-400">${new Date(s.date).toLocaleString()}</p>
                    </div>
                </div>
            `).join('');
        }

        loadFarmers(); // Initial load
    </script>
</body>
</html>
